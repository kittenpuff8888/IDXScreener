name: IDX Screener Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      market_date:
        description: "Optional single market date, format YYYY-MM-DD. Leave blank to backfill."
        required: false
        type: string
      backfill_days:
        description: "When market_date is blank, run the last N market weekdays."
        required: false
        default: "7"
        type: string
  schedule:
    # 17:00 WIB = 10:00 UTC. Weekdays only.
    - cron: "0 10 * * 1-5"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Resolve screener run arguments
        if: github.event_name != 'push'
        id: screener-args
        shell: bash
        run: |
          if [ -n "${{ inputs.market_date }}" ]; then
            if ! [[ "${{ inputs.market_date }}" =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2}$ ]]; then
              echo "market_date must use YYYY-MM-DD"
              exit 1
            fi
            echo "args=--date ${{ inputs.market_date }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "schedule" ]; then
            echo "args=--days 1" >> "$GITHUB_OUTPUT"
          else
            days="${{ inputs.backfill_days }}"
            if [ -z "$days" ]; then
              days="7"
            fi
            if ! [[ "$days" =~ ^[0-9]+$ ]]; then
              echo "backfill_days must be a number"
              exit 1
            fi
            echo "args=--days $days" >> "$GITHUB_OUTPUT"
          fi

      - name: Run screener and export site data
        if: github.event_name != 'push'
        run: python scripts/run_backfill.py ${{ steps.screener-args.outputs.args }}

      - name: Commit generated data
        if: github.event_name != 'push'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/data docs/downloads
          git diff --cached --quiet || git commit -m "Update IDX screener data"
          git push

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
