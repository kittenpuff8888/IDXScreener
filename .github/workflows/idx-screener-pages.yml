name: IDX Screener Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      market_date:
        description: "Optional market date, format YYYY-MM-DD"
        required: false
        type: string
  schedule:
    # 17:00 WIB = 10:00 UTC. Weekdays only.
    - cron: "0 10 * * 1-5"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Resolve market date
        if: github.event_name != 'push'
        id: market-date
        shell: bash
        run: |
          if [ -n "${{ inputs.market_date }}" ]; then
            echo "date=${{ inputs.market_date }}" >> "$GITHUB_OUTPUT"
          else
            echo "date=$(TZ=Asia/Jakarta date +%F)" >> "$GITHUB_OUTPUT"
          fi

      - name: Run screener and export site data
        if: github.event_name != 'push'
        env:
          MARKET_DATE: ${{ steps.market-date.outputs.date }}
        run: python scripts/run_daily.py

      - name: Commit generated data
        if: github.event_name != 'push'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/data docs/downloads
          git diff --cached --quiet || git commit -m "Update IDX screener data for ${{ steps.market-date.outputs.date }}"
          git push

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
