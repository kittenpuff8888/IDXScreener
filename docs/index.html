<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>IDX Screener</title>
    <link rel="stylesheet" href="styles.css?v=20260527-dashboard" />
  </head>
  <body>
    <div class="app">
      <aside class="sidebar" aria-label="Dashboard navigation">
        <div class="brand">
          <span class="brandmark">ID</span>
          <div>
            <strong>IDX Flow</strong>
            <small>VWAP Screener</small>
          </div>
        </div>
        <nav class="nav" role="tablist" aria-label="Dataset">
          <button class="tab active" data-tab="dashboard" type="button">Dashboard</button>
          <button class="tab" data-tab="screener" type="button">Screener Table</button>
          <button class="tab" data-tab="technical" type="button">Technical Detail</button>
          <button class="tab" data-tab="fundamental" type="button">Fundamental Detail</button>
          <button class="tab" data-tab="processing" type="button">Processing</button>
        </nav>
      </aside>

      <main class="shell">
        <header class="topbar">
          <div>
            <h1>Dashboard</h1>
            <p id="runMeta">Loading market data...</p>
          </div>
          <div class="actions">
            <label>
              <span>Date</span>
              <select id="dateSelect"></select>
            </label>
            <a id="downloadLink" class="button" href="#" aria-disabled="true">Workbook</a>
          </div>
        </header>

        <section class="metrics" aria-label="Run summary">
          <div><span>Total Tickers</span><strong id="metricTotal">-</strong></div>
          <div><span>Full Data</span><strong id="metricOk">-</strong></div>
          <div><span>Partial</span><strong id="metricPartial">-</strong></div>
          <div><span>No Data</span><strong id="metricNoData">-</strong></div>
        </section>

        <section class="panel">
          <div class="toolbar" aria-label="Table controls">
            <div>
              <h2 id="viewTitle">Screener</h2>
              <p id="viewMeta">-</p>
            </div>
            <input id="searchInput" type="search" placeholder="Search ticker, sector, setup..." />
          </div>

          <section id="filterBar" class="filterbar" aria-label="Screener filters"></section>

          <section id="dashboardView" class="dashboard-view" aria-label="Dashboard insight cards">
            <div id="signalCards" class="signal-cards"></div>
            <div class="dashboard-grid">
              <section class="insight-panel">
                <div class="panel-heading">
                  <h3>Top Setups</h3>
                  <span>By upside potential</span>
                </div>
                <div id="spotlightCards" class="spotlight-cards"></div>
              </section>
              <section class="insight-panel">
                <div class="panel-heading">
                  <h3>Sector Flow</h3>
                  <span>Current signal mix</span>
                </div>
                <div id="sectorBars" class="sector-bars"></div>
              </section>
            </div>
          </section>

          <section class="tablewrap" aria-live="polite">
            <table>
              <thead id="tableHead"></thead>
              <tbody id="tableBody"></tbody>
            </table>
            <div id="emptyState" class="empty" hidden>No rows for this view.</div>
          </section>
        </section>
      </main>
    </div>

    <script src="app.js?v=20260527-dashboard"></script>
  </body>
</html>
